services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coastal_watch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coastal_watch"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/coastal_watch
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:
